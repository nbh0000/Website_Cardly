<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="AI Project 의견과 댓글을 나누는 페이지" />
    <title>댓글 | AI Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      class="theme-toggle"
      id="themeToggle"
      type="button"
      aria-label="다크 모드로 전환"
      aria-pressed="false"
    >
      <span class="theme-icon" aria-hidden="true">☾</span>
      <span class="theme-label">다크 모드</span>
    </button>

    <main class="container comments-page">
      <nav class="page-nav" aria-label="주요 페이지">
        <a href="index.html">제휴 문의</a>
        <a href="comments.html" aria-current="page">댓글</a>
      </nav>

      <header class="intro">
        <span class="eyebrow">COMMUNITY</span>
        <h1>여러분의 생각을<br />자유롭게 남겨주세요.</h1>
        <p>AI Project에 대한 의견과 아이디어를 나누는 공간입니다. 서로를 존중하는 대화를 부탁드립니다.</p>
      </header>

      <section class="comments-panel" aria-labelledby="commentsTitle">
        <h2 id="commentsTitle">댓글</h2>
        <p class="service-note">
          댓글 기능은 Disqus에서 제공합니다. 댓글을 불러오면 Disqus의 쿠키 및 개인정보 처리 정책이 적용될 수 있습니다.
        </p>
        <div id="disqus_thread"></div>
        <noscript>댓글을 보려면 브라우저에서 JavaScript를 활성화해 주세요.</noscript>
      </section>
    </main>

    <script>
      var disqus_config = function () {
        this.page.url = 'https://nbh0000.github.io/Ai_Project/comments.html';
        this.page.identifier = 'ai-project-comments';
        this.page.title = 'AI Project 댓글';
      };

      (function () {
        var d = document;
        var s = d.createElement('script');
        s.src = 'https://ai-project-nbh0000.disqus.com/embed.js';
        s.setAttribute('data-timestamp', String(Date.now()));
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <script src="main.js"></script>
  </body>
</html>
