<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="서로 다른 500가지 템플릿과 무료 글꼴로 명함을 만들고 PNG로 저장하세요.">
  <title>명함 만들기 | Cardly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;600;700&family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@400;600;800&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">C</span><span>Cardly</span></a><nav class="site-nav" aria-label="주요 메뉴"><a href="maker.html" aria-current="page">명함 만들기</a><a href="about.html">서비스 소개</a><a href="contact.html">문의</a></nav><button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 전환"><span class="theme-icon">☾</span><span class="theme-label">다크 모드</span></button></header>
<main class="maker-section maker-page">
  <div class="section-heading section-shell"><span class="eyebrow">DESIGN STUDIO</span><h1>나만의 명함 만들기</h1><p>서로 다른 500가지 레이아웃과 무료 글꼴을 조합해 보세요.</p></div>
  <div class="studio section-shell">
    <form class="editor-panel" id="cardForm">
      <div class="editor-heading"><span>명함 정보</span><button class="text-button" type="reset">초기화</button></div>
      <div class="field-grid"><div class="field"><label for="cardName">이름</label><input id="cardName" name="cardName" value="김카들리" maxlength="24" autocomplete="name"></div><div class="field"><label for="cardRole">직함</label><input id="cardRole" name="cardRole" value="Product Designer" maxlength="36" autocomplete="organization-title"></div></div>
      <div class="field"><label for="cardCompany">회사 또는 브랜드</label><input id="cardCompany" name="cardCompany" value="CARDLY STUDIO" maxlength="36" autocomplete="organization"></div>
      <div class="field-grid"><div class="field"><label for="cardEmail">이메일</label><input id="cardEmail" name="cardEmail" type="email" value="hello@cardly.design" maxlength="48" autocomplete="email"></div><div class="field"><label for="cardPhone">전화번호</label><input id="cardPhone" name="cardPhone" type="tel" value="010 1234 5678" maxlength="24" autocomplete="tel"></div></div>
      <div class="field"><label for="cardWebsite">웹사이트</label><input id="cardWebsite" name="cardWebsite" value="cardly.design" maxlength="48" autocomplete="url"></div>
      <div class="field"><label for="fontFamily">글꼴 <small class="field-note">모두 무료 사용 가능</small></label><select id="fontFamily" name="fontFamily"><option value="noto-sans">Noto Sans KR</option><option value="nanum-gothic">나눔고딕</option><option value="ibm-plex">IBM Plex Sans KR</option><option value="noto-serif">Noto Serif KR</option><option value="gowun-batang">고운바탕</option><option value="do-hyeon">도현</option><option value="jua">주아</option><option value="black-han">검은고딕</option></select></div>
      <fieldset class="choice-group template-picker"><div class="template-heading"><legend>디자인 템플릿 <small>500</small></legend><select id="templateFilter" aria-label="템플릿 스타일 필터"><option value="all">전체 스타일</option></select></div><div class="template-grid" id="templateGrid" aria-label="명함 템플릿 목록"></div></fieldset>
      <div class="field color-field"><label for="accentColor">포인트 색상</label><div class="color-control"><input id="accentColor" name="accentColor" type="color" value="#635bff"><output id="colorValue" for="accentColor">#635BFF</output></div></div>
    </form>
    <section class="preview-panel" aria-labelledby="previewTitle"><div class="preview-toolbar"><div><span class="status-dot"></span><span id="previewTitle">실시간 미리보기</span></div><span>90 × 50 mm</span></div><div class="preview-stage"><article class="business-card layout-minimal" id="businessCard" aria-label="명함 미리보기"><div class="card-accent"></div><div class="card-brand-row"><span class="card-logo" id="previewInitial">C</span><span class="card-company" id="previewCompany">CARDLY STUDIO</span></div><div class="card-person"><h3 id="previewName">김카들리</h3><p id="previewRole">Product Designer</p></div><div class="card-contact"><span id="previewEmail">hello@cardly.design</span><span id="previewPhone">010 1234 5678</span><span id="previewWebsite">cardly.design</span></div></article></div><button class="button button-primary download-button" id="downloadButton" type="button">PNG로 저장하기 <span>↓</span></button><p class="download-note" id="downloadStatus" aria-live="polite">완성한 명함을 고해상도 이미지로 저장합니다.</p></section>
  </div>
</main>
<footer class="site-footer"><div class="footer-inner section-shell"><a class="brand" href="index.html"><span class="brand-mark">C</span><span>Cardly</span></a><nav><a href="maker.html">명함 만들기</a><a href="about.html">서비스 소개</a><a href="contact.html">문의</a><a href="privacy.html">개인정보처리방침</a><a href="terms.html">이용약관</a></nav></div><p class="copyright">© 2026 Cardly.</p></footer>
<canvas id="exportCanvas" width="1800" height="1000" hidden></canvas><script src="main.js"></script>
</body>
</html>
